<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 Invitación de Cumpleaños 🎉</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Fondo negro puro con un sutil destello rojo oscuro en el centro */
            background: radial-gradient(circle at center, #1a0005 0%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Permite que crezca si el contenido lo requiere */
            padding: 20px; /* Margen de seguridad para pantallas móviles */
            color: white;
        }

        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            background: rgba(10, 10, 10, 0.9); /* Fondo de la tarjeta casi negro */
            backdrop-filter: blur(10px);
            
            /* NEÓN ROJO EN LOS BORDES */
            border: 2px solid #ff003c; 
            border-radius: 25px;
            padding: 45px;
            text-align: center;
            box-shadow:
                0 0 20px #ff003c,
                0 0 40px rgba(255, 0, 60, 0.3);
            
            animation: aparecer 1.2s ease-out;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        h1 {
            font-size: 42px;
            color: #ff003c; /* Neón rojo */
            text-shadow:
                0 0 10px #ff003c,
                0 0 25px #ff003c;
            margin-bottom: 20px;
        }

        h2 {
            color: #ffffff;
            margin-bottom: 30px;
            font-size: 26px;
        }

        .info {
            font-size: 21px;
            line-height: 1.8;
        }

        .info b {
            color: #ff003c; /* Resaltados en rojo */
        }

        .frase {
            margin-top: 30px;
            font-size: 20px;
            line-height: 1.6;
            color: #eeeeee;
        }

        .frase strong {
            display: block;
            margin-top: 20px;
            color: #ff003c;
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.5);
        }

        button {
            margin-top: 35px;
            background: #ff003c; /* Botón rojo neón */
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: .3s ease-in-out;
            box-shadow:
                0 0 15px #ff003c,
                0 0 30px rgba(255, 0, 60, 0.4);
        }

        button:hover {
            transform: scale(1.05);
            background: #ffffff;
            color: #ff003c;
            box-shadow:
                0 0 20px #ffffff,
                0 0 40px #ff003c;
        }

        footer {
            margin-top: 30px;
            color: #cccccc;
            font-size: 14px;
            letter-spacing: 2px;
        }

        /* -------------------------------------------------------------
           MÓVIL RESPONSIVE: Ajustes automáticos para pantallas pequeñas
           ------------------------------------------------------------- */
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px; /* Menos espacio interno en celulares */
                border-radius: 20px;
            }

            h1 {
                font-size: 28px; /* Título más pequeño para que no se corte */
                margin-bottom: 15px;
            }

            h2 {
                font-size: 18px;
                margin-bottom: 20px;
            }

            .info {
                font-size: 16px; /* Texto de info adaptado */
                line-height: 1.6;
            }

            .frase {
                font-size: 16px;
                margin-top: 20px;
            }

            .frase strong {
                font-size: 17px;
            }

            button {
                font-size: 16px;
                padding: 12px 30px;
                margin-top: 25px;
                width: 100%; /* Botón ancho completo en móviles para tocar fácil con el dedo */
            }

            footer {
                font-size: 12px;
                margin-top: 25px;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>🎉 ¡ESTÁS INVITADO! 🎉</h1>
        <h2>Ven a celebrar mi cumpleaños</h2>

        <div class="info">
            📅 <b>Sábado 25 de julio</b><br>
            🕐 <b>1:00 de la tarde</b><br>
            📍 <b>Lugar:</b><br>
            Todo Chaguarquingo City 🍻
        </div>

        <div class="frase">
            Será un día lleno de <b>🍺 alcohol</b>, <b>🎵 música</b>, <b>🍗 comida</b> y muchas sorpresas.
            <br>
            <strong>😎 ¡No faltes! La fiesta no será la misma sin ti. 🎉</strong>
        </div>

        <button onclick="confirmar()">
            ✅ Confirmar asistencia
        </button>

        <footer>
            Nos vemos en la mejor fiesta del año 🍻
        </footer>
    </div>

    <script>
        function confirmar(){
            alert("🥳 ¡Gracias por confirmar tu asistencia! 🍻🎉");
        }
    </script>

</body>
</html>

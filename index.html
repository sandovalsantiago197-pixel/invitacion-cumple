<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Invitación de Cumpleaños 🎉</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
    background:radial-gradient(circle at top,#16213e,#0f172a,#020617);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    color:white;
}

/* Fondo con luces */
body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:#00e5ff;
    filter:blur(180px);
    opacity:.18;
    top:-200px;
    left:-150px;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#7c4dff;
    filter:blur(180px);
    opacity:.18;
    bottom:-180px;
    right:-100px;
}

.card{
    position:relative;
    z-index:10;
    width:90%;
    max-width:620px;
    background:rgba(15,23,42,.85);
    backdrop-filter:blur(15px);
    border:2px solid #00e5ff;
    border-radius:25px;
    padding:45px;
    text-align:center;
    box-shadow:
    0 0 20px #00e5ff,
    0 0 50px rgba(0,229,255,.3);
    animation:aparecer 1.2s;
}

@keyframes aparecer{
from{
opacity:0;
transform:translateY(40px) scale(.9);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

h1{
    font-size:48px;
    color:#00e5ff;
    text-shadow:
    0 0 10px #00e5ff,
    0 0 25px #00e5ff,
    0 0 50px #00e5ff;
    margin-bottom:20px;
}

h2{
    color:#ffffff;
    margin-bottom:30px;
    font-size:30px;
}

.info{
    font-size:23px;
    line-height:2;
}

.info b{
    color:#00e5ff;
}

.frase{
    margin-top:30px;
    font-size:22px;
    line-height:1.8;
    color:#eeeeee;
}

button{
    margin-top:35px;
    background:#00e5ff;
    color:#001b2b;
    border:none;
    padding:16px 40px;
    border-radius:40px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:.35s;
    box-shadow:
    0 0 15px #00e5ff,
    0 0 35px #00e5ff;
}

button:hover{
    transform:scale(1.08);
    background:#7c4dff;
    color:white;
    box-shadow:
    0 0 15px #7c4dff,
    0 0 40px #7c4dff,
    0 0 70px #7c4dff;
}

footer{
    margin-top:30px;
    color:#8ecae6;
    font-size:15px;
    letter-spacing:2px;
}
</style>

</head>

<body>

<div class="card">

<h1>🎉 ¡ESTÁS INVITADO! 🎉</h1>

<h2>Ven a celebrar mi cumpleaños</h2>

<div class="info">

📅 <b>Sábado 25 de julio</b><br>

🕐 <b>1:00 de la tarde</b><br>

📍 <b>Lugar:</b><br>

Todo Chaguarquingo City 🍻

</div>

<div class="frase">

Será un día lleno de <b>🍺 alcohol</b>, <b>🎵 música</b>, <b>🍗 comida</b> y muchas sorpresas.

<br><br>

<strong>😎 ¡No faltes! La fiesta no será la misma sin ti. 🎉</strong>

</div>

<button onclick="confirmar()">
✅ Confirmar asistencia
</button>

<footer>
Nos vemos en la mejor fiesta del año 🍻
</footer>

</div>

<script>

function confirmar(){

alert("🥳 ¡Gracias por confirmar tu asistencia! 🍻🎉");

}

</script>

</body>
</html>

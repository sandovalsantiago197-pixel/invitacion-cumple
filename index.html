<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Invitación de Cumpleaños 🎉</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(10px);
    border:2px solid gold;
    border-radius:25px;
    padding:40px;
    width:90%;
    max-width:550px;
    text-align:center;
    color:white;
    box-shadow:0 0 30px rgba(255,215,0,.3);
    animation:entrada 1.2s;
}

h1{
    color:gold;
    font-size:45px;
    margin-bottom:15px;
}

h2{
    color:#4fc3f7;
    margin-bottom:20px;
}

.info{
    font-size:22px;
    margin:15px 0;
    line-height:1.8;
}

.frase{
    margin-top:20px;
    font-size:22px;
}

button{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:40px;
    background:#1976d2;
    color:white;
    font-size:20px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    background:#0d47a1;
}

@keyframes entrada{
from{
opacity:0;
transform:scale(.5);
}
to{
opacity:1;
transform:scale(1);
}
}

.confetti{
position:absolute;
width:10px;
height:10px;
animation:caer linear infinite;
}

@keyframes caer{
0%{
transform:translateY(-100px) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(720deg);
}
}
</style>

</head>
<body>

<div class="card">

<h1>🎉 ¡ESTÁS INVITADO! 🎉</h1>

<h2>Ven a celebrar mi cumpleaños</h2>

<div class="info">
📅 <b>Sábado 25 de julio</b><br><br>

🕐 <b>1:00 de la tarde</b><br><br>

📍 <b>Lugar:</b><br>
Todo Chaguarquingo City 🍻
</div>

<div class="frase">
Será un día lleno de <b>🍺 alcohol, 🎵 música, 🍗 comida</b> y muchas sorpresas.<br><br>

<b>¡No faltes!</b> 😎🎉
</div>

<button onclick="alert('🥳 ¡Gracias por confirmar! ¡Nos vemos en la fiesta! 🍻')">
✅ Confirmar asistencia
</button>

</div>

<script>

const colores=[
"gold",
"#2196f3",
"#ff9800",
"#4caf50",
"#f44336",
"#9c27b0",
"#00e5ff"
];

for(let i=0;i<180;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=colores[Math.floor(Math.random()*colores.length)];

c.style.animationDuration=(3+Math.random()*5)+"s";

c.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(c);

}

</script>

</body>
</html>
